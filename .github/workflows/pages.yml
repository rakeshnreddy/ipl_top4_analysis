name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Generate canonical IPL payload
        env:
          CRICDATA_API_KEY: ${{ secrets.CRICDATA_API_KEY }}
          CRICDATA_SERIES_ID: ${{ secrets.CRICDATA_SERIES_ID }}
        run: python extract_table.py

      - name: Generate Instagram carousel slides
        run: python scripts/create_instagram_carousel.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/ipl-analyzer-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/ipl-analyzer-frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend/ipl-analyzer-frontend
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/ipl-analyzer-frontend/dist

      - name: Deploy Pages
        uses: actions/deploy-pages@v4
